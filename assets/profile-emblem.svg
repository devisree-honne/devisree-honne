<svg viewBox="0 0 760 60" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Decorative divider: midnight clock, glass slipper as a neural network, AI node cluster">
  <defs>
    <style>
      @keyframes sparkle {
        0%, 100% { opacity: 0.15; }
        50% { opacity: 1; }
      }
      @keyframes dash {
        to {
          stroke-dashoffset: -20;
        }
      }
      @keyframes glow-gold {
        0%, 100% { filter: drop-shadow(0 0 1px #D4AF37); opacity: 0.85; }
        50% { filter: drop-shadow(0 0 5px #D4AF37); opacity: 1; }
      }
      @keyframes glow-cyan {
        0%, 100% { filter: drop-shadow(0 0 1px #4FD6E8); opacity: 0.85; }
        50% { filter: drop-shadow(0 0 5px #4FD6E8); opacity: 1; }
      }
      
      .sparkle-1 { animation: sparkle 2s infinite ease-in-out; }
      .sparkle-2 { animation: sparkle 3s infinite ease-in-out 0.5s; }
      .sparkle-3 { animation: sparkle 2.5s infinite ease-in-out 1s; }
      .sparkle-4 { animation: sparkle 3.5s infinite ease-in-out 1.5s; }
      .sparkle-5 { animation: sparkle 2.2s infinite ease-in-out 0.2s; }
      .sparkle-6 { animation: sparkle 2.8s infinite ease-in-out 0.8s; }
      
      .clock-ring { animation: glow-gold 3s infinite ease-in-out; }
      .slipper-path { animation: glow-gold 4s infinite ease-in-out 1s; }
      .slipper-nodes { animation: sparkle 2s infinite ease-in-out; }
      .net-line { stroke-dasharray: 4, 4; animation: dash 3s linear infinite; }
      .node-pulse { animation: glow-cyan 3s infinite ease-in-out; }
    </style>
  </defs>

  <rect x="0" y="0" width="760" height="60" rx="30" fill="#0B1229"/>

  <!-- left: midnight clock -->
  <g class="clock-ring">
    <circle cx="120" cy="30" r="14" fill="none" stroke="#D4AF37" stroke-width="1.5"/>
    <circle cx="120" cy="30" r="17" fill="none" stroke="#D4AF37" stroke-width="0.5" stroke-dasharray="1, 3"/>
    <!-- Hour hand pointing to just before 12 -->
    <line x1="120" y1="30" x2="118.5" y2="21" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Minute hand pointing to 12 -->
    <line x1="120" y1="30" x2="120" y2="18" stroke="#D4AF37" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="120" cy="30" r="1.5" fill="#D4AF37"/>
  </g>
  <g fill="#4FD6E8">
    <circle cx="95" cy="16" r="1.6" class="node-pulse"/>
    <circle cx="145" cy="44" r="1.4" class="node-pulse"/>
    <circle cx="100" cy="45" r="1.2" class="node-pulse"/>
  </g>

  <!-- center: glass slipper traced as a neural network -->
  <g transform="translate(350,8)">
    <path d="M10,38 C8,28 14,18 26,14 C36,10 46,12 50,18 C54,24 50,30 44,32 L44,40 C44,44 40,46 34,46 L14,46 C8,46 6,42 10,38 Z"
          fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linejoin="round" class="slipper-path"/>
    <path d="M44,32 L52,42 C54,44 52,46 48,46 L44,46 Z"
          fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linejoin="round" class="slipper-path"/>
    <g stroke="#4FD6E8" stroke-width="0.8" opacity="0.75" class="net-line">
      <line x1="26" y1="14" x2="50" y2="18"/>
      <line x1="50" y1="18" x2="44" y2="32"/>
      <line x1="44" y1="32" x2="14" y2="46"/>
      <line x1="26" y1="14" x2="14" y2="46"/>
    </g>
    <g fill="#4FD6E8">
      <circle cx="26" cy="14" r="1.8" class="slipper-nodes"/>
      <circle cx="50" cy="18" r="1.8" class="slipper-nodes"/>
      <circle cx="44" cy="32" r="1.8" class="slipper-nodes"/>
      <circle cx="14" cy="46" r="1.8" class="slipper-nodes"/>
    </g>
  </g>

  <!-- right: AI node cluster -->
  <g stroke="#4FD6E8" stroke-width="0.8" opacity="0.85" class="net-line">
    <line x1="610" y1="24" x2="635" y2="18"/>
    <line x1="635" y1="18" x2="655" y2="30"/>
    <line x1="610" y1="24" x2="655" y2="30"/>
    <line x1="635" y1="18" x2="635" y2="42"/>
    <line x1="610" y1="24" x2="635" y2="42"/>
    <line x1="655" y1="30" x2="635" y2="42"/>
  </g>
  <g fill="#D4AF37">
    <circle cx="610" cy="24" r="2" class="node-pulse"/>
    <circle cx="635" cy="18" r="2" class="node-pulse"/>
    <circle cx="655" cy="30" r="2" class="node-pulse"/>
    <circle cx="635" cy="42" r="2" class="node-pulse"/>
  </g>

  <!-- scattered fairy-dust sparkles -->
  <g fill="#D4AF37">
    <circle cx="230" cy="12" r="1.5" class="sparkle-1"/>
    <circle cx="270" cy="48" r="1.8" class="sparkle-2"/>
    <circle cx="500" cy="14" r="1.5" class="sparkle-3"/>
    <circle cx="540" cy="46" r="1.8" class="sparkle-4"/>
    <circle cx="310" cy="18" r="1.2" class="sparkle-5"/>
    <circle cx="430" cy="42" r="1.2" class="sparkle-6"/>
  </g>
</svg>
